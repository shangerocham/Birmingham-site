<form
  name="contact"
  method="POST"
  data-netlify="true"
  className="w-full max-w-4xl mx-auto bg-black/80 border border-yellow-500 rounded-2xl p-6 md:p-8 shadow-2xl backdrop-blur-sm"
>
  <input type="hidden" name="form-name" value="contact" />

  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

    <input
      type="text"
      name="name"
      placeholder="Full Name"
      required
      className="w-full p-4 rounded-xl bg-zinc-900 text-white border border-zinc-700 focus:border-yellow-500 outline-none"
    />

    <input
      type="email"
      name="email"
      placeholder="Email Address"
      required
      className="w-full p-4 rounded-xl bg-zinc-900 text-white border border-zinc-700 focus:border-yellow-500 outline-none"
    />

    <input
      type="tel"
      name="phone"
      placeholder="Phone Number"
      className="w-full p-4 rounded-xl bg-zinc-900 text-white border border-zinc-700 focus:border-yellow-500 outline-none"
    />

    <input
      type="text"
      name="location"
      placeholder="Property Location"
      className="w-full p-4 rounded-xl bg-zinc-900 text-white border border-zinc-700 focus:border-yellow-500 outline-none"
    />

  </div>

  <textarea
    name="message"
    placeholder="Tell us about your property or enquiry"
    rows="5"
    className="w-full mt-4 p-4 rounded-xl bg-zinc-900 text-white border border-zinc-700 focus:border-yellow-500 outline-none"
  ></textarea>

  <button
    type="submit"
    className="w-full mt-6 bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-4 rounded-xl transition-all duration-300 text-lg"
  >
    Get My Free Offer
  </button>

  <div className="text-center text-zinc-400 text-sm mt-4">
    Confidential • No Obligation • Fast Response
  </div>
</form>
